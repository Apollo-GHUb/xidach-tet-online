<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xì Dách Pro - Sòng Bài VIP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #111;
            background-image: radial-gradient(circle at center, #0d4a22 0%, #051c0c 100%); 
            color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; 
            padding: 10px; overflow: hidden; 
        }
        h1 { color: #ffd700; text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5); margin-bottom: 5px; font-size: 1.5rem;}
        
        #login-screen { display: flex; flex-direction: column; gap: 15px; margin-top: 100px; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 15px; border: 1px solid #b8860b; z-index: 10;}
        input { padding: 12px; font-size: 1.1rem; border-radius: 8px; border: none; text-align: center; background: #222; color: #fff; border: 1px solid #b8860b;}
        
        .btn { padding: 10px 20px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .btn.primary { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; }
        .btn.primary:hover:not(:disabled) { box-shadow: 0 0 15px #ffd700; }
        .btn.success { background: linear-gradient(145deg, #4caf50, #2e7d32); color: white; }
        .btn.danger { background: linear-gradient(145deg, #f44336, #c62828); color: white; }
        
        /* BÀN CHƠI THIẾT KẾ LẠI GỌN GÀNG */
        #game-screen { display: none; width: 100%; max-width: 1200px; height: calc(100vh - 60px); flex-direction: column; position: relative;}
        
        .table-area { 
            flex: 1; border: 15px solid #3e2723; border-radius: 150px; 
            background: radial-gradient(circle, #1b5e20 0%, #003300 100%); 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 15px 30px rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; padding: 20px; position: relative;
        }
        
        #dealer-zone-container { flex: 0.4; display: flex; justify-content: center; align-items: flex-start; }
        #players-zone-container { flex: 0.6; display: flex; justify-content: space-around; align-items: flex-end; flex-wrap: wrap; padding-bottom: 20px;}
        
        .player-zone { text-align: center; transition: 0.3s; position: relative; display: flex; flex-direction: column; align-items: center; width: 140px;}
        .player-zone.is-me { transform: scale(1.1); z-index: 5; }
        
        .zone-header { margin-bottom: 5px; font-size: 0.95rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 20px; border: 1px solid #555; white-space: nowrap;}
        .player-zone.active-turn .zone-header { border-color: #4caf50; box-shadow: 0 0 15px #4caf50; background: rgba(76, 175, 80, 0.3);}
        
        .money-badge { color: #ffd700; margin-left: 5px; font-weight: bold; }
        .status-badge { background: #b8860b; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; color: #fff; display: block; margin-top: 3px;}
        
        /* BÀI XẾP CHỒNG LÊN NHAU (GỌN GÀNG) */
        .cards { display: flex; justify-content: center; min-height: 90px; padding-left: 20px; }
        .card { 
            width: 60px; height: 85px; background: white; border-radius: 6px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: black; 
            box-shadow: -3px 2px 5px rgba(0,0,0,0.4); border: 1px solid #ccc;
            margin-left: -35px; /* Ép bài đè lên nhau */
            transition: 0.2s; position: relative;
        }
        .card:hover { transform: translateY(-10px); z-index: 10; } 
        .card.red { color: #d32f2f; }
        .card.hidden { background: repeating-linear-gradient(45deg, #1a237e, #1a237e 5px, #283593 5px, #283593 10px); color: transparent; border: 2px solid #fff; }
        .card.squeezing-card { background: radial-gradient(circle, #8b0000, #3e0000); color: #ffd700; font-size: 0.9rem; cursor: pointer; border: 2px dashed #ffd700; animation: pulseAndShake 1.2s infinite; }
        
        /* ANIMATION CHIA BÀI TỪNG LÁ */
        .card.deal-anim { animation: flyFromCenter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes flyFromCenter {
            from { opacity: 0; transform: translate(0, -150px) scale(0) rotate(180deg); }
            to { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        /* ANIMATION ĐỒNG TIỀN (CHIP POKER) VÀ SỐ TIỀN CƯỢC */
        .bet-area { position: absolute; bottom: -25px; right: -25px; display: flex; flex-direction: column; align-items: center; z-index: 2;}
        .chips-stack { display: flex; flex-direction: column; align-items: center; animation: dropChip 0.4s ease-out; }
        .chip { 
            width: 32px; height: 32px; border-radius: 50%; color: #fff; font-weight: bold; font-size: 0.75rem; 
            display: flex; justify-content: center; align-items: center; border: 2px dashed rgba(255,255,255,0.6); 
            box-shadow: 0 3px 5px rgba(0,0,0,0.6), inset 0 0 5px rgba(0,0,0,0.5); margin-top: -18px; 
        }
        /* Mệnh giá Chip */
        .chip-5 { background: #e0e0e0; color: #000; border-color: #9e9e9e; }
        .chip-10 { background: #2196F3; }
        .chip-20 { background: #4CAF50; }
        .chip-50 { background: #F44336; }
        .chip-100 { background: #212121; border-color: #ffd700; color: #ffd700;}
        .chip-200 { background: #9C27B0; }
        .chip-500 { background: #FFD700; color: #000; border-color: #000;}
        
        .bet-text { 
            margin-top: 5px; font-size: 0.8rem; font-weight: bold; background: rgba(0,0,0,0.8); 
            padding: 2px 6px; border-radius: 5px; color: #ffd700; border: 1px solid #b8860b; white-space: nowrap;
        }

        @keyframes dropChip { from { transform: translateY(-50px) scale(1.5); opacity: 0;} to { transform: translateY(0) scale(1); opacity: 1;} }

        #controls-area { text-align: center; padding: 10px; margin-top: 10px; z-index: 5;}
        
        /* KHUNG CHAT */
        #chat-widget { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end;}
        #chat-btn { 
            width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(145deg, #ffd700, #b8860b); 
            display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; position: relative;
        }
        #chat-btn:hover { transform: scale(1.1); }
        #chat-toast { 
            position: absolute; right: 75px; bottom: 10px; background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; 
            border-radius: 20px; font-size: 0.9rem; border: 1px solid #ffd700; white-space: nowrap; max-width: 250px; 
            overflow: hidden; text-overflow: ellipsis; opacity: 0; pointer-events: none; transition: 0.3s; transform: translateX(20px);
        }
        #chat-toast.show { opacity: 1; transform: translateX(0); }
        #chat-panel { 
            display: none; width: 320px; height: 400px; background: rgba(10, 10, 10, 0.95); border: 1px solid #b8860b; 
            border-radius: 15px; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 15px;
        }
        #chat-header { background: #222; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #b8860b; font-weight: bold; color: #ffd700;}
        #chat-header button { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        #chat-history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem; }
        .msg { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; word-wrap: break-word;}
        .msg strong { color: #ffd700; }
        #chat-input-area { display: flex; border-top: 1px solid #b8860b;}
        #chat-input-area input { flex: 1; padding: 12px; border: none; background: #111; color: white; border-radius: 0;}
        #chat-input-area button { border-radius: 0; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="text-align: center;">🧨 XÌ DÁCH TẾT VIP 🧨</h1>
        <input type="text" id="username" placeholder="Nhập tên của bạn..." autocomplete="off">
        <button class="btn primary" onclick="joinGame()">Vào Sòng Bài</button>
    </div>

    <div id="game-screen">
        <div class="table-area" id="board">
            <div id="dealer-zone-container"></div>
            <div id="players-zone-container"></div>
        </div>
        <div id="controls-area"></div>
    </div>

    <div id="chat-widget" style="display: none;">
        <div id="chat-panel">
            <div id="chat-header"><span>Sòng Bài Chat 💬</span> <button onclick="toggleChat()">✖</button></div>
            <div id="chat-history"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Khích tướng..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn success" onclick="sendChat()">Gửi</button>
            </div>
        </div>
        <div id="chat-btn" onclick="toggleChat()">
            💬
            <div id="chat-toast"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myId = null;
        let myRevealedIndexes = new Set(); // MỚI: Game bắt đầu với tập hợp RỖNG (chưa lật lá nào)
        let isChatOpen = false;
        let isDealingMode = false;
        let lastStarted = false;

        function joinGame() {
            const name = document.getElementById('username').value.trim();
            if(name) {
                socket.emit('join', name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                document.getElementById('chat-widget').style.display = 'flex';
            }
        }

        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-panel').style.display = isChatOpen ? 'flex' : 'none';
        }

        function sendChat() {
            const inp = document.getElementById('chat-input');
            if (inp.value.trim() !== '') {
                socket.emit('send_chat', inp.value);
                inp.value = '';
            }
        }

        socket.on('receive_chat', (data) => {
            const hist = document.getElementById('chat-history');
            hist.innerHTML += `<div class="msg"><strong>${data.name}:</strong> ${data.text}</div>`;
            hist.scrollTop = hist.scrollHeight;

            if (!isChatOpen) {
                let toast = document.getElementById('chat-toast');
                toast.innerHTML = `<strong>${data.name}:</strong> ${data.text}`;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
            }
        });

        // THUẬT TOÁN ĐỔI TIỀN THÀNH CHIP (Mệnh giá: 500, 200, 100, 50, 20, 10, 5)
        function getChipsHtml(betAmount) {
            if (betAmount <= 0) return '';
            let html = `<div class="bet-area"><div class="chips-stack">`;
            
            const denoms = [500, 200, 100, 50, 20, 10, 5];
            let remaining = betAmount;
            let chipElements = [];

            // Ưu tiên chia lấy chip lớn trước
            for (let d of denoms) {
                let count = Math.floor(remaining / d);
                for (let i = 0; i < count; i++) {
                    chipElements.push(`<div class="chip chip-${d}">${d}</div>`);
                }
                remaining %= d;
            }

            // Đảo ngược mảng để chip lớn nằm dưới, chip nhỏ xếp chồng lên trên
            html += chipElements.reverse().join('');
            
            // Hiện rõ số tiền bên dưới các chip
            html += `</div><div class="bet-text">Cược: ${betAmount}k</div></div>`;
            return html;
        }

        function revealMyCard(index) {
            myRevealedIndexes.add(index);
            renderBoard(window.lastGameState);
        }

        socket.on('update_state', (state) => {
            myId = socket.id;
            window.lastGameState = state;
            
            if (state.isStarted && !lastStarted) {
                isDealingMode = true;
                // MỚI: Reset lại bài thành úp hoàn toàn (Set rỗng) khi ván mới bắt đầu
                myRevealedIndexes = new Set();
                setTimeout(() => { isDealingMode = false; }, 3000);
            } else if (!state.isStarted) {
                isDealingMode = false;
            }
            lastStarted = state.isStarted;

            renderBoard(state);
        });

        function renderBoard(state) {
            const dealerZone = document.getElementById('dealer-zone-container');
            const playersZone = document.getElementById('players-zone-container');
            const controls = document.getElementById('controls-area');
            dealerZone.innerHTML = ''; playersZone.innerHTML = ''; controls.innerHTML = '';

            let me = state.players[myId];
            if (!me) return;

            const isDealer = (myId === state.dealerId);
            let dealer = state.players[state.dealerId];
            
            let totalBets = 0;
            let playerOrderArray = []; 
            for(let id in state.players) {
                if (id !== state.dealerId && state.players[id].bet > 0) {
                    totalBets++;
                    playerOrderArray.push(id);
                }
            }
            if (state.dealerId) playerOrderArray.push(state.dealerId); 

            // --- 1. RENDER NHÀ CÁI ---
            if (dealer) {
                let isDealerTurn = (state.currentTurnId === state.dealerId);
                let dHtml = `<div class="player-zone is-dealer ${isDealer ? 'is-me' : ''} ${isDealerTurn ? 'active-turn' : ''}">`;

                let dProfitStr = dealer.profit > 0 ? `+${dealer.profit}k` : (dealer.profit < 0 ? `${dealer.profit}k` : `0k`);
                let turnInfo = isDealerTurn ? '<span class="status-badge" style="background:#4caf50;">LƯỢT CỦA CÁI</span>' : '';

                dHtml += `<div class="zone-header">👑 ${dealer.name} <span class="money-badge">${dProfitStr}</span> ${turnInfo}</div><div class="cards">`;
                
                let p_idx = playerOrderArray.indexOf(state.dealerId);
                let numP = playerOrderArray.length;

                dealer.hand.forEach((c, i) => {
                    let animDelay = (isDealingMode && i < 2) ? ((i * numP) + p_idx) * 0.15 : 0;
                    let animStyle = animDelay > 0 ? `animation-delay: ${animDelay}s; opacity: 0;` : '';
                    let animClass = animDelay > 0 ? 'deal-anim' : '';

                    if (isDealer) {
                        if (myRevealedIndexes.has(i)) dHtml += `<div class="card ${animClass} ${(c.s === '♥' || c.s === '♦') ? 'red' : ''}" style="${animStyle}">${c.v}${c.s}</div>`;
                        else dHtml += `<div class="card squeezing-card ${animClass}" style="${animStyle}" onclick="revealMyCard(${i})">NẶN</div>`;
                    } else {
                        if (state.dealerRevealed || state.isRevealed) dHtml += `<div class="card ${animClass} ${(c.s === '♥' || c.s === '♦') ? 'red' : ''}" style="${animStyle}">${c.v}${c.s}</div>`;
                        else dHtml += `<div class="card hidden ${animClass}" style="${animStyle}"></div>`;
                    }
                });
                
                dHtml += `</div></div>`;
                dealerZone.innerHTML = dHtml;
            }

            // --- 2. RENDER NHÀ CON ---
            for (let id in state.players) {
                if (id === state.dealerId) continue;
                let p = state.players[id];
                let isMe = (id === myId);
                let isMyTurn = (state.currentTurnId === id);
                let p_idx = playerOrderArray.indexOf(id);
                let numP = playerOrderArray.length;
                
                let pStatusTxt = '';
                let isFullyRevealed = state.isRevealed || p.status === 'checked'; 

                if (isFullyRevealed) pStatusTxt = '<span class="status-badge">ĐÃ XÉT</span>';
                else if (p.status === 'stand' || p.status === 'checked') pStatusTxt = '<span class="status-badge">ĐÃ DẰN</span>';
                else if (isMyTurn) pStatusTxt = '<span class="status-badge" style="background:#4caf50;">ĐANG RÚT</span>';

                let pProfitStr = p.profit > 0 ? `+${p.profit}k` : (p.profit < 0 ? `${p.profit}k` : `0k`);

                let pHtml = `<div class="player-zone ${isMe ? 'is-me' : ''} ${isMyTurn ? 'active-turn' : ''}">
                    <div class="zone-header">${p.name} <span class="money-badge">${pProfitStr}</span> ${pStatusTxt}</div>`;
                
                // HIỂN THỊ CHIP POKER VÀ TIỀN CƯỢC
                pHtml += getChipsHtml(p.bet);
                
                // Nút xét bài cho nhà cái
                if (isDealer && state.currentTurnId === state.dealerId && p.status === 'stand') {
                    pHtml += `<button class="btn danger small" style="position:absolute; top:-15px; z-index:10;" onclick="socket.emit('check_player', '${id}')">XÉT BÀI</button>`;
                }

                pHtml += `<div class="cards">`;
                
                p.hand.forEach((c, i) => {
                    let animDelay = (isDealingMode && i < 2 && p.bet > 0) ? ((i * numP) + p_idx) * 0.15 : 0;
                    let animStyle = animDelay > 0 ? `animation-delay: ${animDelay}s; opacity: 0;` : '';
                    let animClass = animDelay > 0 ? 'deal-anim' : '';

                    if (isMe && !isFullyRevealed) {
                        if (myRevealedIndexes.has(i)) pHtml += `<div class="card ${animClass} ${(c.s === '♥' || c.s === '♦') ? 'red' : ''}" style="${animStyle}">${c.v}${c.s}</div>`;
                        else pHtml += `<div class="card squeezing-card ${animClass}" style="${animStyle}" onclick="revealMyCard(${i})">NẶN</div>`;
                    } else if (isFullyRevealed || (isMe && isFullyRevealed)) {
                        pHtml += `<div class="card ${animClass} ${(c.s === '♥' || c.s === '♦') ? 'red' : ''}" style="${animStyle}">${c.v}${c.s}</div>`;
                    } else {
                        pHtml += `<div class="card hidden ${animClass}" style="${animStyle}"></div>`;
                    }
                });
                
                pHtml += `</div></div>`;
                playersZone.innerHTML += pHtml;
            }

            // --- 3. RENDER NÚT ĐIỀU KHIỂN ---
            let isMyTurn = (state.currentTurnId === myId);
            
            // Logic MỚI: Bắt buộc người chơi (Cái/Con) phải nặn hết bài đang cầm trên tay thì mới cho bấm nút thao tác.
            let isMyCardsFullyRevealed = me && me.hand && (myRevealedIndexes.size >= me.hand.length);

            if (!state.dealerId) {
                controls.innerHTML = `<button class="btn primary" onclick="socket.emit('take_dealer')">Giành Quyền Làm Cái 👑</button>`;
            } else if (isDealer) {
                if (!state.isStarted) {
                    controls.innerHTML = `<button class="btn primary" onclick="socket.emit('deal_cards')" ${totalBets === 0 ? 'disabled' : ''}>Chia Bài (${totalBets} tụ cược)</button>`;
                } else if (isMyTurn) {
                    let blockDealerHit = (state.isRevealed || state.dealerRevealed);
                    controls.innerHTML = `
                        <button class="btn success" onclick="socket.emit('hit')" ${(blockDealerHit || !isMyCardsFullyRevealed) ? 'disabled' : ''}>Cái Rút Thêm</button>
                        <button class="btn primary" onclick="socket.emit('reveal_all')" ${!isMyCardsFullyRevealed ? 'disabled' : ''}>Xét Toàn Bàn</button>
                        <button class="btn danger" onclick="socket.emit('reset_game')" style="margin-left: 10px;">Ván Mới</button>
                    `;
                } else {
                    controls.innerHTML = `<h3 style="color:#ffd700;">Đang đợi các nhà con xử lý bài...</h3>`;
                }
            } else { 
                if (!state.isStarted) {
                    if (me.bet === 0) {
                        controls.innerHTML = `
                            <input type="number" id="bet-input" value="50" step="10" min="5" style="width: 120px; margin-right: 10px; padding: 10px; border-radius: 5px;">
                            <button class="btn primary" onclick="socket.emit('place_bet', document.getElementById('bet-input').value)">Chồng Tiền Cược</button>
                        `;
                    } else {
                        controls.innerHTML = `<h3 style="color: #4caf50;">💰 Đã thả ${me.bet}k... Đợi cái chia bài!</h3>`;
                    }
                } else if (me.status === 'playing') {
                    controls.innerHTML = `
                        <button class="btn success" onclick="socket.emit('hit')" ${(!isMyTurn || !isMyCardsFullyRevealed) ? 'disabled' : ''}>Kéo Bài (Hit)</button>
                        <button class="btn danger" onclick="socket.emit('stand')" ${(!isMyTurn || !isMyCardsFullyRevealed) ? 'disabled' : ''}>Dằn Bài (Stand)</button>
                    `;
                } else {
                    controls.innerHTML = `<h3 style="color:#b8860b;">Chờ nhà cái thao tác...</h3>`;
                }
            }
        }
    </script>
</body>
</html>
